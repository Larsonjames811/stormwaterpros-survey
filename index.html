<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stormwater Pros — AI Assessment</title>
<style>
  :root{
    --bg:#ffffff; --ink:#1a1c1e; --muted:#6b7280; --line:#e5e7eb;
    --accent:#1f6feb; --accent-ink:#ffffff; --soft:#f4f6f8; --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font:17px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:640px;margin:0 auto;padding:32px 22px 80px;min-height:100vh;display:flex;flex-direction:column}
  .bar{height:5px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:40px}
  .bar > i{display:block;height:100%;width:0;background:var(--accent);transition:width .3s ease}
  .brandrow{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:var(--muted);margin-bottom:28px;letter-spacing:.2px}
  .dot{width:9px;height:9px;border-radius:99px;background:var(--accent)}
  h1{font-size:34px;line-height:1.15;margin:0 0 14px;letter-spacing:-.5px}
  .step{display:none;animation:fade .35s ease}
  .step.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  label.q{display:block;font-size:24px;font-weight:650;line-height:1.3;margin:0 0 6px;letter-spacing:-.2px}
  .help{color:var(--muted);font-size:15px;margin:0 0 18px}
  .req{color:var(--accent);font-weight:700}
  input[type=text],input[type=email],textarea{
    width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;
    font:inherit;color:var(--ink);background:#fff;outline:none;transition:border-color .15s}
  input:focus,textarea:focus{border-color:var(--accent)}
  textarea{min-height:130px;resize:vertical}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .opt{display:flex;align-items:center;gap:12px;padding:13px 15px;border:1.5px solid var(--line);
    border-radius:12px;cursor:pointer;transition:.12s;user-select:none;background:#fff}
  .opt:hover{border-color:#c9d3e0;background:var(--soft)}
  .opt.sel{border-color:var(--accent);background:#eff5ff}
  .opt .key{width:26px;height:26px;flex:0 0 26px;border-radius:7px;background:var(--soft);
    display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--muted)}
  .opt.sel .key{background:var(--accent);color:#fff}
  .nav{display:flex;align-items:center;gap:14px;margin-top:30px}
  button.go{appearance:none;border:0;background:var(--ink);color:#fff;font:inherit;font-weight:650;
    padding:13px 26px;border-radius:12px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:.15s}
  button.go:hover{transform:translateY(-1px)}
  button.go.disabled{opacity:.4;pointer-events:none}
  button.back{appearance:none;border:0;background:none;color:var(--muted);font:inherit;cursor:pointer;padding:8px}
  button.back:hover{color:var(--ink)}
  .intro p{color:#333;font-size:18px}
  .fine{color:var(--muted);font-size:13px;margin-top:20px}
  #booking{text-align:center}
  .cal-note{color:var(--muted);font-size:15px;margin:2px 0 22px}
  .calendly-inline-widget{min-width:320px;height:680px}
  .fallback{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:18px;text-align:left;font-size:15px}
  a.book{display:inline-block;margin-top:6px;background:var(--accent);color:#fff;text-decoration:none;
    padding:13px 24px;border-radius:12px;font-weight:650}
  .rep-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
  .rep-row input{flex:1}
  .rep-rm{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:10px;width:44px;height:48px;cursor:pointer;color:var(--muted);font-size:15px}
  .rep-rm:hover{border-color:#e0b4b4;color:#c0392b}
  .rep-add{margin-top:4px;border:1.5px dashed #c9d3e0;background:#fff;border-radius:10px;padding:11px 16px;cursor:pointer;font:inherit;font-weight:600;color:var(--accent)}
  .rep-add:hover{background:var(--soft)}
  .tg-card{border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px}
  .tg-task{font-size:16px;margin-bottom:10px}
  .tg-inputs{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .tg-amt{width:92px;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font:inherit}
  .tg-sel{padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font:inherit;background:#fff;cursor:pointer}
  .tg-per{color:var(--muted)}
  .tg-sub{font-size:14px;color:var(--muted);margin:16px 0 8px;font-weight:600}
  .tg-checks{display:flex;flex-direction:column;gap:7px}
  .tg-chip{display:flex;align-items:center;gap:9px;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;cursor:pointer;font-size:15px;transition:.12s}
  .tg-chip:hover{background:var(--soft)}
  .tg-chip.on{border-color:var(--accent);background:#eff5ff}
  .tg-chip input{width:17px;height:17px;accent-color:var(--accent);flex:0 0 auto}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"><i id="prog"></i></div>
  <div class="brandrow"><span class="dot"></span> CERTIFIED AI PARTNERS</div>
  <div id="host"></div>
</div>

<script>
/* ============================================================
   CONFIG — the only things you edit
   ============================================================ */
const CONFIG = {
  company: "Stormwater Pros",
  // Cal.com 15-min event.
  cal: { calLink: "james-larson-q450wp/15min", namespace: "15min" },
  // Storage — auto-saves every response to Supabase (insert-only public key).
  supabase: {
    url: "https://zqyhnbisgpyupjhuobii.supabase.co",
    anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxeWhuYmlzZ3B5dXBqaHVvYmlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MDY3NTcsImV4cCI6MjA5ODA4Mjc1N30.ST7SvSB6RUtnINPdj0aG2216ID8onlG5vyNkkbOA2PM",
    table: "responses"
  }
};

// Q4 prompt changes by role — the only branching.
const PROCESS_PROMPTS = {
  A: "Your team builds the bids — pulling the plans, counting the infiltration wells, pricing it out. Walk us through how YOU do it, from a plan set landing in your inbox to the bid going out. Where do you end up waiting or double-checking?",
  B: "Your team turns an inspection into a customer quote. Walk us through your part — from the inspection coming in to the quote going out. Where does it get slow or manual?",
  C: "Walk us through how you get crews to jobs — how you decide who goes where, how routes get set, and how last-minute changes get handled. Where does it get painful?",
  D: "Walk us through your monthly close — gathering the numbers, entering, reconciling, reporting. Where does the time actually go?",
  E: "Think about everything that comes across your desk — calls, emails, scheduling, paperwork. What most often gets stuck, bounces back to you, or eats your day?",
  F: "From the 30,000-ft view — what are the one or two processes you think are holding the company back from its next stage of growth? Be as specific as you can."
};

/* ============================================================
   SURVEY — the funnel
   ============================================================ */
const STEPS = [
  { type:"intro" },
  { id:"name",  type:"text",  label:"First, who are you?", help:"Your full name.", required:true, placeholder:"Full name" },
  { id:"email", type:"email", label:"And your work email?", help:"So we can send your interview invite.", required:true, placeholder:"you@stormwaterprosllc.com" },
  { id:"office",type:"choice",label:"Which office are you in?", required:true,
    options:[["A","Arizona"],["B","California"],["C","Utah"],["D","Corporate / Remote"]] },
  { id:"role", type:"choice", label:"Which best describes your role?", help:"Pick the one closest to your main work.", required:true, branch:true,
    options:[["A","Sales / Estimating / Bids"],["B","Maintenance / Account Executive"],["C","Operations / Dispatch"],["D","Finance / Accounting"],["E","Admin / Office / Coordination"],["F","Executive / Senior Management"]] },
  { id:"week",  type:"long", label:"What does a typical week look like for you?", required:true,
    help:"The stuff you do most often — daily or on a cycle. Bullet points are perfectly fine." },
  { id:"process", type:"long", dynamicLabel:true, required:true,
    help:"As much detail as you can — bullet points are perfect. Mention what tool you're in at each step if you can.", placeholder:"Start to finish…" },
  { id:"tasks", type:"repeater", label:"Wave a magic wand 🪄", required:true,
    help:"What tasks would you love to hand off — the stuff that eats your time or drives you nuts? List your top few (e.g. re-entering data, chasing approvals, building reports, reading plans). We'll dig into your 3 biggest next.", placeholder:"e.g. bank reconciliation" },
  { id:"tasktimes", type:"timegrid", label:"Let's dig into your top 3.",
    help:"For each: roughly how long it takes, how you do it now, and who else does it." },
  { id:"else",  type:"long", label:"Any of these cost the company money when they're late or wrong?", help:"Optional — that, or anything else slowing you or the company down." },
  { type:"booking" }
];

/* ============================================================
   ENGINE
   ============================================================ */
const answers = {};
let i = 0;
const host = document.getElementById("host");
const prog = document.getElementById("prog");

function letterFor(){ return answers.role || "F"; }

function render(){
  const s = STEPS[i];
  prog.style.width = Math.round((i/(STEPS.length-1))*100) + "%";
  host.innerHTML = "";
  const step = document.createElement("div");
  step.className = "step active";

  if(s.type === "intro"){
    step.innerHTML = `
      <h1>${CONFIG.company} — AI Assessment</h1>
      <div class="intro">
        <p><b>Takes about 5 minutes.</b> We're Certified AI Partners, working with Brig to find where AI can take busywork off your plate and give you time back. The best ideas come from the people actually doing the work — that's you.</p>
        <p>No wrong answers, bullet points are perfectly fine, and the more honest the better. What you share just makes our quick call with you next week actually useful.</p>
      </div>`;
    addNav(step, {next:"Let's go", back:false});
  }
  else if(s.type === "booking"){
    step.innerHTML = `
      <h1>You're all set 🎉</h1>
      <p class="cal-note">Last step — grab a 15-minute slot next week so we can go deeper on your answers.</p>
      <div id="cal"></div>`;
    mountBooking(step.querySelector("#cal"));
  }
  else {
    const labelText = s.dynamicLabel ? PROCESS_PROMPTS[letterFor()] : s.label;
    const help = s.help||"";
    step.innerHTML = `
      <label class="q">${labelText} ${s.required?'<span class="req">*</span>':''}</label>
      ${help?`<p class="help">${help}</p>`:""}
      <div id="field"></div>`;
    buildField(step.querySelector("#field"), s);
    addNav(step, {next: i===STEPS.length-2 ? "Finish" : "Next"});
  }
  host.appendChild(step);
}

function buildField(mount, s){
  if(s.type==="choice"){
    const box = document.createElement("div"); box.className="opts";
    s.options.forEach(([k,txt])=>{
      const o=document.createElement("div"); o.className="opt"+(answers[s.id]===k?" sel":"");
      o.innerHTML=`<span class="key">${k}</span><span>${txt}</span>`;
      o.onclick=()=>{ answers[s.id]=k; render(); setTimeout(()=>autoNext(s),140); };
      box.appendChild(o);
    });
    mount.appendChild(box);
  } else if(s.type==="repeater"){ buildRepeater(mount,s);
  } else if(s.type==="timegrid"){ buildTimeGrid(mount,s);
  } else {
    const el = document.createElement(s.type==="long"?"textarea":"input");
    if(s.type!=="long") el.type = s.type==="email"?"email":"text";
    el.placeholder = s.placeholder||"";
    el.value = answers[s.id]||"";
    el.oninput = ()=>{ answers[s.id]=el.value; toggleNext(s); };
    mount.appendChild(el);
    setTimeout(()=>el.focus(),50);
  }
}

function escapeHtml(x){ return String(x).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function mkSelect(opts, val, onchange){
  const sel=document.createElement("select"); sel.className="tg-sel";
  opts.forEach(o=>{ const op=document.createElement("option"); op.value=o; op.textContent=o; if(o===val)op.selected=true; sel.appendChild(op); });
  sel.onchange=()=>onchange(sel.value);
  return sel;
}
function buildRepeater(mount, s){
  if(!Array.isArray(answers[s.id])) answers[s.id]=[""];
  const list=answers[s.id];
  const wrap=document.createElement("div");
  function draw(){
    wrap.innerHTML="";
    list.forEach((val,idx)=>{
      const row=document.createElement("div"); row.className="rep-row";
      const inp=document.createElement("input"); inp.type="text"; inp.value=val;
      inp.placeholder=s.placeholder||"";
      inp.oninput=()=>{ list[idx]=inp.value; toggleNext(s); };
      row.appendChild(inp);
      if(list.length>1){
        const rm=document.createElement("button"); rm.type="button"; rm.className="rep-rm"; rm.textContent="✕";
        rm.onclick=()=>{ list.splice(idx,1); draw(); toggleNext(s); };
        row.appendChild(rm);
      }
      wrap.appendChild(row);
    });
    const add=document.createElement("button"); add.type="button"; add.className="rep-add"; add.textContent="+ Add another";
    add.onclick=()=>{ list.push(""); draw(); const inps=wrap.querySelectorAll("input"); inps[inps.length-1].focus(); };
    wrap.appendChild(add);
  }
  draw(); mount.appendChild(wrap);
  setTimeout(()=>{ const f=wrap.querySelector("input"); if(f) f.focus(); },50);
}
const HOW_OPTIONS=[
  "Mostly by hand / from experience",
  "Reading or interpreting documents",
  "In a spreadsheet or doc",
  "Re-typing the same info in more than one place",
  "Copy-pasting between different apps",
  "Lots of email / phone back-and-forth",
  "A tool does most of it, but I still fix it by hand"
];
function buildTimeGrid(mount, s){
  const allTasks=(answers.tasks||[]).filter(t=>t&&t.trim());
  const tasks=allTasks.slice(0,3); // deep-dive only the top 3 to avoid fatigue
  if(!Array.isArray(answers[s.id])) answers[s.id]=[];
  const store=answers[s.id];
  if(!tasks.length){ mount.innerHTML='<p class="help">Go back a step and list a task first.</p>'; return; }
  const wrap=document.createElement("div");
  tasks.forEach((task,idx)=>{
    if(!store[idx]) store[idx]={task, amount:"", unit:"hours", freq:"week", how:[], headcount:"Just me"};
    else store[idx].task=task;
    if(!Array.isArray(store[idx].how)) store[idx].how=[];
    if(!store[idx].headcount) store[idx].headcount="Just me";
    const card=document.createElement("div"); card.className="tg-card";
    const lab=document.createElement("div"); lab.className="tg-task"; lab.innerHTML=`You listed: <b>${escapeHtml(task)}</b>`;
    card.appendChild(lab);
    // time
    const row=document.createElement("div"); row.className="tg-inputs";
    const amt=document.createElement("input"); amt.type="number"; amt.min="0"; amt.placeholder="e.g. 2"; amt.value=store[idx].amount; amt.className="tg-amt";
    amt.oninput=()=>{ store[idx].amount=amt.value; };
    const unit=mkSelect(["minutes","hours"], store[idx].unit, v=>store[idx].unit=v);
    const per=document.createElement("span"); per.className="tg-per"; per.textContent="per";
    const freq=mkSelect(["day","week","month"], store[idx].freq, v=>store[idx].freq=v);
    row.append(amt, unit, per, freq);
    card.appendChild(row);
    // how (multi-select, check all that apply)
    const howLab=document.createElement("div"); howLab.className="tg-sub"; howLab.textContent="How do you do it today? (check all that apply)";
    card.appendChild(howLab);
    const checks=document.createElement("div"); checks.className="tg-checks";
    HOW_OPTIONS.forEach(opt=>{
      const chip=document.createElement("label"); chip.className="tg-chip"+(store[idx].how.includes(opt)?" on":"");
      const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=store[idx].how.includes(opt);
      cb.onchange=()=>{ if(cb.checked){ if(!store[idx].how.includes(opt)) store[idx].how.push(opt);} else { store[idx].how=store[idx].how.filter(x=>x!==opt);} chip.classList.toggle("on",cb.checked); };
      chip.append(cb, document.createTextNode(" "+opt));
      checks.appendChild(chip);
    });
    card.appendChild(checks);
    // headcount multiplier
    const hcLab=document.createElement("div"); hcLab.className="tg-sub"; hcLab.textContent="How many others do this same task?";
    card.appendChild(hcLab);
    card.appendChild(mkSelect(["Just me","A few of us","Most of my team","Every office"], store[idx].headcount, v=>store[idx].headcount=v));
    wrap.appendChild(card);
  });
  if(allTasks.length>3){
    const note=document.createElement("p"); note.className="help";
    note.textContent=`(We'll dig into the other ${allTasks.length-3} on our call.)`;
    wrap.appendChild(note);
  }
  mount.appendChild(wrap);
}

function addNav(step, {next="Next", back=true}){
  const nav=document.createElement("div"); nav.className="nav";
  const b=document.createElement("button"); b.className="go"; b.innerHTML=`${next} <span>→</span>`;
  b.onclick=advance;
  if(back && i>0){ const bk=document.createElement("button"); bk.className="back"; bk.textContent="← Back";
    bk.onclick=()=>{ i--; render(); }; nav.appendChild(bk); }
  nav.appendChild(b);
  step.appendChild(nav);
  toggleNext(STEPS[i]);
}

function valid(s){
  if(!s || !s.required) return true;
  if(s.type==="repeater"){ return Array.isArray(answers[s.id]) && answers[s.id].some(v=>v&&String(v).trim()); }
  const v=answers[s.id];
  if(!v) return false;
  if(s.type==="email") return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v);
  return String(v).trim().length>0;
}
function toggleNext(s){
  const btn=host.querySelector("button.go");
  if(!btn||STEPS[i].type==="choice") return;
  btn.classList.toggle("disabled", !valid(s));
}
function autoNext(s){ if(valid(s)) advance(); }
function advance(){
  const s=STEPS[i];
  if(!valid(s)) return;
  if(i>=STEPS.length-2){ submit(); }
  i++; render();
}

/* ---- storage ---- */
async function submit(){
  const payload = {
    company: CONFIG.company,
    name: answers.name||"", email: answers.email||"",
    office: labelOf("office"), role: labelOf("role"),
    answers, submitted_at: new Date().toISOString()
  };
  console.log("ASSESSMENT RESPONSE →", payload);
  window._lastResponse = payload;
  const c = CONFIG.supabase;
  if(c.url && c.anonKey){
    try{
      await fetch(`${c.url}/rest/v1/${c.table}`,{method:"POST",
        headers:{apikey:c.anonKey,Authorization:`Bearer ${c.anonKey}`,
          "Content-Type":"application/json",Prefer:"return=minimal"},
        body:JSON.stringify({name:payload.name,email:payload.email,office:payload.office,role:payload.role,answers,submitted_at:payload.submitted_at})});
    }catch(e){ console.warn("save failed",e); }
  }
}
function labelOf(id){
  const s=STEPS.find(x=>x.id===id); if(!s||!s.options) return answers[id]||"";
  const hit=s.options.find(o=>o[0]===answers[id]); return hit?hit[1]:(answers[id]||"");
}

/* ---- booking ---- */
function mountBooking(mount){
  const name=answers.name||""; const email=answers.email||"";
  const C=CONFIG.cal;
  mount.innerHTML=`<div id="my-cal-inline-15min" style="width:100%;height:680px;overflow:auto"></div>`;
  (function (W, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = W.document; W.Cal = W.Cal || function () { let cal = W.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
  Cal("init", C.namespace, {origin:"https://app.cal.com"});
  Cal.config = Cal.config || {}; Cal.config.forwardQueryParams = true;
  Cal.ns[C.namespace]("inline", {
    elementOrSelector:"#my-cal-inline-15min",
    config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true", name, email},
    calLink: C.calLink,
  });
  Cal.ns[C.namespace]("ui", {"cssVarsPerTheme":{"light":{"cal-brand":"#1f6feb"},"dark":{"cal-brand":"#ffffff"}},"hideEventTypeDetails":false,"layout":"month_view"});
}

document.addEventListener("keydown",e=>{
  if(e.key==="Enter" && STEPS[i] && !["long","intro","repeater","timegrid"].includes(STEPS[i].type)){ advance(); }
});
render();
</script>
</body>
</html>
